name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv venv
      - run: uv pip install ruff
      - run: uv run ruff check src/
      - run: uv run ruff format --check src/

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      - run: uv run mypy src/agentforge

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      # Integration tests require live MCP server connections — run unit tests only in CI
      - run: uv run pytest tests/unit/ --cov=src/agentforge --cov-report=term-missing
